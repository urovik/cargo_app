services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    #environment:
      # DATABASE_URL уже берётся из .env, но можно и явно переопределить, если нужно
      # DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-net
    ports:
      - "5432:5432"

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
